name: Lint Markdown

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Lint Markdown Files
        run: npx markdownlint-cli2 "**/*.md"
