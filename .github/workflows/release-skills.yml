name: Release Skills

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'CHANGELOG.md'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        id: release
        with:
          release-type: simple

      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        if: ${{ steps.release.outputs.release_created }}

      - name: Copy updater scripts to skills directory
        run: |
          cp scripts/update.sh skills/
          cp scripts/update.ps1 skills/
        if: ${{ steps.release.outputs.release_created }}

      - name: Zip skills directory
        run: zip -r skills.zip skills
        if: ${{ steps.release.outputs.release_created }}

      - name: Upload Release Asset
        run: gh release upload "${{ steps.release.outputs.tag_name }}" skills.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ steps.release.outputs.release_created }}

